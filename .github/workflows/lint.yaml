name: Code Quality
on:
  - push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --locked --group lint --group test

      - name: PyLint
        run: |
          readarray -t py_files < <(git ls-files '*.py')
          uv run pylint "${py_files[@]}"

      - name: Pyright
        run: uv run pyright

      - name: Ruff check
        run: uv run ruff check .

      - name: Black check
        run: uv run black --check .
