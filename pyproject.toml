[build-system]
requires = ["setuptools >= 74.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hundredandtenserverless"
version = "0.0.0"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Seamus Lowry" },
]
classifiers = [
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "azure-functions==1.24.0",
    "beanie==2.1.0",
    "cachecontrol==0.14.4",
    "fastapi==0.135.2",
    "google-auth==2.49.1",
    "hundredandten==4.0.1",
    "pymongo==4.16.0",
    "pyjwt==2.12.1",
    "requests==2.33.0",
]

[dependency-groups]
lint = [
    "pylint==4.0.5",
    "pyright==1.1.408",
    "ruff==0.15.8",
    "black==26.3.1",
]
test = [
    "coverage==7.13.5",
    "httpx==0.28.1",
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
]

[tool.coverage.run]
omit = [
    "src/tests/*"
]

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["tests", "tests.*"]

[tool.pyright]
useLibraryCodeForTypes = true

[tool.isort]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]


[tool.pylint.design]
# Beanie's Document class has 9 ancestors due to mixin interfaces
max-parents = 15
# Allow Settings/Config classes to have no methods (framework pattern)
min-public-methods = 0

[tool.ruff]
target-version = "py314"
line-length = 100
lint.extend-select = ["I"]

[tool.black]
target-version = ["py314"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true